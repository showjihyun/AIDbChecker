# Spec: MVP.md §7.1
# NeuralDB Demo v1 — Docker Compose (단일 노드)

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: neuraldb-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neuraldb}
      POSTGRES_USER: ${POSTGRES_USER:-neuraldb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neuraldb}
    ports:
      - "127.0.0.1:5432:5432"  # SEC-06: bind to localhost only
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuraldb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  valkey:
    image: valkey/valkey:8-alpine
    container_name: neuraldb-valkey
    ports:
      - "127.0.0.1:6379:6379"  # SEC-06: bind to localhost only
    command: valkey-server --maxmemory 1gb --maxmemory-policy allkeys-lru --requirepass ${VALKEY_PASSWORD:-neuraldb}
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: neuraldb-backend
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://neuraldb:neuraldb@postgres:5432/neuraldb
      VALKEY_URL: redis://:${VALKEY_PASSWORD:-neuraldb}@valkey:6379/0
      CELERY_BROKER_URL: redis://:${VALKEY_PASSWORD:-neuraldb}@valkey:6379/1
      CELERY_RESULT_BACKEND: redis://:${VALKEY_PASSWORD:-neuraldb}@valkey:6379/2
      APP_ENV: development
      APP_DEBUG: "true"
      CORS_ORIGINS: '["http://localhost:3000"]'
      # Ollama runs on host machine — use host.docker.internal to reach it from container
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      # AI defaults — set AI_MODEL to a model installed in Ollama (e.g., llama3.1:8b)
      AI_MODEL: "llama3.1:8b"
      # Entrypoint: PostgreSQL connection for pg_isready + Alembic sync driver
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: neuraldb
      # Slack Bot Token API (set via .env or override)
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      # SEC-04: Use env vars for secrets (override via .env file)
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-NeuralDB@2026!}
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: always

  celery-worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: neuraldb-celery-worker
    # Skip entrypoint migration/seed — backend service handles that
    entrypoint: []
    command: ["uv", "run", "celery", "-A", "app.tasks", "worker", "-l", "info", "--pool", "solo", "-Q", "celery,collect,alert,analyze"]
    environment:
      DATABASE_URL: postgresql+asyncpg://neuraldb:neuraldb@postgres:5432/neuraldb
      VALKEY_URL: redis://:${VALKEY_PASSWORD:-neuraldb}@valkey:6379/0
      CELERY_BROKER_URL: redis://:${VALKEY_PASSWORD:-neuraldb}@valkey:6379/1
      CELERY_RESULT_BACKEND: redis://:${VALKEY_PASSWORD:-neuraldb}@valkey:6379/2
    depends_on:
      backend:
        condition: service_started
      valkey:
        condition: service_healthy
    restart: always

  celery-beat:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: neuraldb-celery-beat
    # Skip entrypoint migration/seed — backend service handles that
    entrypoint: []
    command: ["uv", "run", "celery", "-A", "app.tasks", "beat", "-l", "info"]
    environment:
      DATABASE_URL: postgresql+asyncpg://neuraldb:neuraldb@postgres:5432/neuraldb
      VALKEY_URL: redis://:${VALKEY_PASSWORD:-neuraldb}@valkey:6379/0
      CELERY_BROKER_URL: redis://:${VALKEY_PASSWORD:-neuraldb}@valkey:6379/1
      CELERY_RESULT_BACKEND: redis://:${VALKEY_PASSWORD:-neuraldb}@valkey:6379/2
    depends_on:
      backend:
        condition: service_started
      valkey:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ../../frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    container_name: neuraldb-frontend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  pg_data:
