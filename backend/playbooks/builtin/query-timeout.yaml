# Spec: FS-AUTO-003 (Lite) — Built-in Playbook #6
apiVersion: neuraldb/v1
kind: Playbook

metadata:
  name: "query-timeout"
  version: "1.0"
  description: "Long-running query 감지 — pg_cancel_backend"
  author: "builtin"
  tags: [query, performance, postgresql]
  min_autonomy_level: 1
  target_db_types: [postgresql]
  risk_level: low

trigger:
  type: metric_threshold
  metric: query_duration_ms
  condition: ">"
  threshold: 30000
  duration: 0s
  cooldown: 5m
  min_confidence: 0.5

steps:
  - name: "find_long_queries"
    type: sql
    query: |
      SELECT pid, usename, query,
             EXTRACT(EPOCH FROM (clock_timestamp() - query_start)) * 1000 AS duration_ms
      FROM pg_stat_activity
      WHERE state = 'active'
        AND query NOT LIKE '%pg_stat%'
        AND EXTRACT(EPOCH FROM (clock_timestamp() - query_start)) > 30
      ORDER BY query_start
      LIMIT 5
    timeout: 10s
    save_as: long_queries

  - name: "cancel_query"
    type: sql
    query: "SELECT pg_cancel_backend({{ long_queries[0].pid }})"
    timeout: 5s
    requires_approval: true
    rollback:
      query: "-- cancel is safe, no rollback needed"

on_success:
  - notify: slack
    message: "Long query cancelled: PID={{ long_queries[0].pid }}, duration={{ long_queries[0].duration_ms }}ms"

on_failure:
  - notify: slack
    severity: warning
    message: "Query cancel 실패: {{ error }}"
