# Spec: FS-AUTO-003 (Lite) — Built-in Playbook #3
apiVersion: neuraldb/v1
kind: Playbook

metadata:
  name: "replication-lag"
  version: "1.0"
  description: "Replication lag 감지 — WAL sender 점검 및 알림"
  author: "builtin"
  tags: [replication, ha, postgresql]
  min_autonomy_level: 2
  target_db_types: [postgresql]
  risk_level: high

trigger:
  type: metric_threshold
  metric: replication_lag_bytes
  condition: ">"
  threshold: 104857600
  duration: 60s
  cooldown: 10m
  min_confidence: 0.5

steps:
  - name: "check_replication_status"
    type: sql
    query: |
      SELECT client_addr, state, sent_lsn, write_lsn, flush_lsn, replay_lsn,
             pg_wal_lsn_diff(sent_lsn, replay_lsn) AS lag_bytes
      FROM pg_stat_replication
    timeout: 10s
    save_as: replication_info

  - name: "check_wal_sender"
    type: sql
    query: |
      SELECT pid, state, query FROM pg_stat_activity
      WHERE backend_type = 'walsender'
    timeout: 10s
    save_as: wal_senders

on_success:
  - notify: slack
    message: "Replication lag 점검 완료: lag={{ replication_info[0].lag_bytes }} bytes"

on_failure:
  - notify: slack
    severity: critical
    message: "Replication lag 점검 실패: {{ error }}"
