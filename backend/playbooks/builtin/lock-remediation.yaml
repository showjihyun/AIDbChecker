# Spec: FS-AUTO-003 (Lite) — Built-in Playbook #1
apiVersion: neuraldb/v1
kind: Playbook

metadata:
  name: "lock-remediation"
  version: "1.0"
  description: "Lock contention 자동 해소 — 블로킹 세션 감지 후 kill"
  author: "builtin"
  tags: [performance, lock, postgresql]
  min_autonomy_level: 2
  target_db_types: [postgresql]
  risk_level: medium

trigger:
  type: metric_threshold
  metric: lock_wait_timeout
  condition: ">"
  threshold: 5000
  duration: 30s
  cooldown: 5m
  min_confidence: 0.5

steps:
  - name: "detect_blocking_queries"
    type: sql
    query: |
      SELECT pid, query, wait_event_type, wait_event,
             age(clock_timestamp(), query_start) AS duration
      FROM pg_stat_activity
      WHERE state = 'active' AND wait_event_type = 'Lock'
      ORDER BY query_start
      LIMIT 10
    timeout: 10s
    save_as: blocking_sessions

  - name: "kill_blocking_session"
    type: sql
    query: "SELECT pg_terminate_backend({{ blocking_sessions[0].pid }})"
    timeout: 5s
    requires_approval: true
    rollback:
      query: "-- no rollback needed for session kill"

on_success:
  - notify: slack
    message: "Lock remediation 완료: 블로킹 세션 종료됨"

on_failure:
  - rollback: all
  - notify: slack
    severity: critical
    message: "Lock remediation 실패: {{ error }}"
